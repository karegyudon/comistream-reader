name: Sync Upstream and Build Docker Image

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/comistream-reader
  UPSTREAM_REPO: https://github.com/sorshi/comistream-reader.git

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout fork repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect default branch
        id: branch
        run: |
          echo "name=${{ github.event.repository.default_branch }}" >> "$GITHUB_OUTPUT"

      - name: Add upstream remote
        run: |
          git remote add upstream "${UPSTREAM_REPO}" || true
          git fetch upstream --prune

      - name: Sync upstream
        run: |
          git checkout "${{ steps.branch.outputs.name }}"
          git merge --ff-only "upstream/${{ steps.branch.outputs.name }}" || {
            echo "Fast-forward merge failed. Please resolve conflicts manually in your fork."
            exit 1
          }
          git push origin "${{ steps.branch.outputs.name }}"

      - name: Show repository tree
        run: |
          pwd
          find . -maxdepth 3 | sort

      - name: Patch Dockerfile for build context
        run: |
          sed -i 's|COPY /comistream-tools/|COPY comistream-tools/|g' comistream/container/Dockerfile
          echo "Patched COPY lines:"
          grep '^COPY' comistream/container/Dockerfile || true

      - name: Verify required build files
        run: |
          test -f comistream/container/Dockerfile
          test -f comistream-tools/httpd.conf
          test -f comistream-tools/comistream.tar.gz

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./comistream/container/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
