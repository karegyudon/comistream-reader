name: Sync Upstream and Build Docker Image

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/comistream-reader
  UPSTREAM_REPO: https://github.com/sorshi/comistream-reader.git

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout fork repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect default branch
        id: branch
        run: |
          echo "name=${{ github.event.repository.default_branch }}" >> "$GITHUB_OUTPUT"

      - name: Add upstream remote
        run: |
          git remote add upstream "${UPSTREAM_REPO}" || true
          git fetch upstream --prune

      - name: Sync upstream
        run: |
          git checkout "${{ steps.branch.outputs.name }}"
          git merge --ff-only "upstream/${{ steps.branch.outputs.name }}" || {
            echo "Fast-forward merge failed. Please resolve conflicts manually in your fork."
            exit 1
          }
          git push origin "${{ steps.branch.outputs.name }}"

      - name: Show repository tree
        run: |
          echo "PWD=$(pwd)"
          echo "== top level =="
          ls -la
          echo "== find (depth 4) =="
          find . -maxdepth 4 | sort
          echo "== Dockerfiles =="
          find . -type f -name Dockerfile | sort || true
          echo "== httpd.conf candidates =="
          find . -type f -name httpd.conf | sort || true
          echo "== comistream.tar.gz candidates =="
          find . -type f -name comistream.tar.gz | sort || true

      - name: Detect build paths
        id: paths
        run: |
          DOCKERFILE="$(find . -type f -path '*/comistream/container/Dockerfile' | head -n 1)"
          if [ -z "$DOCKERFILE" ]; then
            echo "Cannot find */comistream/container/Dockerfile"
            exit 1
          fi

          TOOLS_DIR="$(find . -type d -name 'comistream-tools' | head -n 1)"
          if [ -z "$TOOLS_DIR" ]; then
            echo "Cannot find comistream-tools directory"
            exit 1
          fi

          echo "dockerfile=$DOCKERFILE" >> "$GITHUB_OUTPUT"
          echo "toolsdir=$TOOLS_DIR" >> "$GITHUB_OUTPUT"

          echo "Detected Dockerfile: $DOCKERFILE"
          echo "Detected tools dir: $TOOLS_DIR"

      - name: Patch Dockerfile for build context
        run: |
          cp "${{ steps.paths.outputs.dockerfile }}" /tmp/Dockerfile.original
          sed -i 's|COPY /comistream-tools/|COPY comistream-tools/|g' "${{ steps.paths.outputs.dockerfile }}"
          echo "== patched COPY lines =="
          grep '^COPY' "${{ steps.paths.outputs.dockerfile }}" || true

      - name: Prepare isolated build context
        run: |
          rm -rf /tmp/build-context
          mkdir -p /tmp/build-context/comistream/container
          mkdir -p /tmp/build-context/comistream-tools

          cp "${{ steps.paths.outputs.dockerfile }}" /tmp/build-context/comistream/container/Dockerfile
          cp -a "${{ steps.paths.outputs.toolsdir }}/." /tmp/build-context/comistream-tools/

          echo "== build context tree =="
          find /tmp/build-context -maxdepth 4 | sort

          test -f /tmp/build-context/comistream/container/Dockerfile
          test -f /tmp/build-context/comistream-tools/httpd.conf
          test -f /tmp/build-context/comistream-tools/comistream.tar.gz

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: /tmp/build-context
          file: /tmp/build-context/comistream/container/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
